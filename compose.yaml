name: history-wall-local

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: history_wall
      POSTGRES_USER: history_wall
      POSTGRES_PASSWORD: history_wall
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - history_wall_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U history_wall -d history_wall"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 3s
    restart: unless-stopped

volumes:
  history_wall_postgres_data:
